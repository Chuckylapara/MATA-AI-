# Render.com blueprint — Mata AI backend + managed PostgreSQL (persistent data).
databases:
  - name: mata-ai-db
    plan: free
    databaseName: mata
    user: mata

services:
  - type: web
    name: mata-ai-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: SERVICE
        value: devserver          # all services in one process
      - key: DEV_INMEMORY
        value: "1"                # in-memory queue/rate-limit (no Redis needed)
      - key: DATABASE_URL
        fromDatabase:             # persistent managed Postgres (survives redeploys)
          name: mata-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "120"
      - key: GEMINI_API_KEY
        sync: false                # set in the Render dashboard (secret)
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: KIE_API_KEY
        sync: false                # kie.ai — set the value in the Render dashboard (secret)
      # Optional extra providers (leave unset to use free fallbacks):
      - key: OPENAI_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: ELEVENLABS_VOICE_ID
        sync: false
      - key: CORS_ORIGINS
        value: "https://mata-ai-236ad.web.app,https://mata-ai-backend.onrender.com"
        # Add more origins if needed (Vercel preview URLs, custom domain, etc.)
