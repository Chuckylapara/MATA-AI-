# Render.com blueprint — Mata AI backend + managed PostgreSQL (persistent data).
databases:
  - name: mata-ai-db
    plan: free
    databaseName: mata
    user: mata

services:
  - type: web
    name: mata-ai-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: SERVICE
        value: devserver          # all services in one process
      - key: DEV_INMEMORY
        value: "1"                # in-memory queue/rate-limit (no Redis needed)
      - key: DATABASE_URL
        fromDatabase:             # persistent managed Postgres (survives redeploys)
          name: mata-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "120"
      - key: GEMINI_API_KEY
        sync: false                # set in the Render dashboard (secret)
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: CORS_ORIGINS
        sync: false                # your Vercel/Firebase URL
